name: sentinlnk_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.0
  lucide_icons: ^0.257.0
  encrypt: ^5.0.3
  crypto: ^3.0.7
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_blue_plus: ^2.1.1
  permission_handler: ^12.0.1
  protobuf: 4.2.0
  meshtastic_flutter: any
  shared_preferences: ^2.5.4

dependency_overrides:
  flutter_blue_plus: ^2.1.1
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  windows:
    generate: true
  macos:
    generate: true
  linux:
    generate: true
  image_path: "assets/SentinLNK logo.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/SentinLNK logo.png"